# DEV
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
%dev.quarkus.http.cors.exposed-headers=authorization
%dev.quarkus.http.cors.access-control-allow-credentials=true

# PROD (sostituisci con il dominio del frontend)
%prod.quarkus.http.cors=true
%prod.quarkus.http.cors.origins=https://app.tuodominio.it
%prod.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%prod.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
%prod.quarkus.http.cors.exposed-headers=authorization
# abilita SOLO se usi cookie cross-site (session/refresh token in cookie)
# %prod.quarkus.http.cors.access-control-allow-credentials=true

# Connessione al database PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://192.168.0.124:5432/medical
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# Abilita il pool di connessioni
quarkus.datasource.jdbc.max-size=8

# Abilita Hibernate ORM
quarkus.hibernate-orm.database.generation=update

quarkus.mailer.host=smtps.aruba.it
quarkus.mailer.port=465
quarkus.mailer.ssl=true
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}
quarkus.mailer.from=volley@polisportivamogliano.it

quarkus.mailer.mock=false
# In dev mode, prevent from using the mock SMTP server

quarkus.log.level=INFO
quarkus.log.category."io.vertx.ext.mail".level=INFO
quarkus.log.category."io.quarkus.mailer".level=INFO

# JWT Configuration
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
mp.jwt.verify.issuer=medical-visit


# JWT Custom
jwt.expiration.hours=24

# ? Security policies - PERMETTI /api/auth/* SENZA autenticazione
quarkus.http.auth.permission.public.paths=/api/auth/*
quarkus.http.auth.permission.public.policy=permit

# ? Security policies - TUTTO il resto richiede autenticazione
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated